<!DOCTYPE html>
<html lang="ru-RU">
<head>
    <meta charset="utf-8">
    <title>Вход на WordPress.org</title>
    <style>
        body {
            background: #f0f0f1;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        #login {
            width: 320px;
            padding: 20px;
        }
        h1 a {
            background-image: url('https://s.w.org/style/images/wporg-logo.svg?2');
            background-size: 80px;
            width: 80px;
            height: 80px;
            display: block;
            margin: 0 auto 20px;
            text-indent: -9999px;
        }
        form {
            background: white;
            padding: 26px 24px 34px;
            border: 1px solid #c3c4c7;
            box-shadow: 0 1px 3px rgba(0,0,0,.04);
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px;
            border: 1px solid #8c8f94;
            border-radius: 4px;
        }
        input[type="submit"] {
            background: #2271b1;
            color: white;
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            width: 100%;
            cursor: pointer;
            font-size: 14px;
        }
        input[type="submit"]:hover {
            background: #135e96;
        }
        .rememberme {
            margin: 15px 0;
        }
        .intro {
            font-size: 13px;
            margin-bottom: 20px;
            color: #50575e;
        }
    </style>
</head>
<body>
<div id="login">
    <h1><a href="https://ru.wordpress.org/">WordPress</a></h1>
    <form name="loginform" id="loginform" action="/wp-login.php" method="post">
        <p class="intro">Войдите в учётную запись WordPress.org</p>

        <label for="user_login">Имя пользователя или email</label>
        <input type="text" name="log" id="user_login" class="input" value="" size="20">

        <label for="user_pass">Пароль</label>
        <input type="password" name="pwd" id="user_pass" class="input" value="" size="20">

        <p class="rememberme">
            <label>
                <input name="rememberme" type="checkbox" value="forever"> Запомнить меня
            </label>
        </p>

        <input type="submit" name="wp-submit" id="wp-submit" class="button button-primary" value="Войти">
    </form>
</div>
</body>
</html>
